version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: aerostrat-mongo
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - ./mongo-data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: aerostrat-backend
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/aerostrat
      - PRIMARY_TELEMETRY_URL=${PRIMARY_TELEMETRY_URL:-https://opensky-network.org/api/states/all}
      - FALLBACK_TELEMETRY_URL=${FALLBACK_TELEMETRY_URL:-https://api.adsb.lol}
      - AERODATABOX_API_KEY=${AERODATABOX_API_KEY:-}
      - OPENSKY_USER1=${OPENSKY_USER1:-}
      - OPENSKY_PASS1=${OPENSKY_PASS1:-}
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build:
      context: ./client
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    container_name: aerostrat-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    restart: unless-stopped
