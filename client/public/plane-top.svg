      <stop offset="30%"  stop-color="#e8eef6"/>
      <stop offset="50%"  stop-color="#f5f8fc"/>
      <stop offset="70%"  stop-color="#e2e9f2"/>
      <stop offset="100%" stop-color="#9aaabb" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="wingL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ccd6e4" stop-opacity="0.95"/>
      <stop offset="40%"  stop-color="#dde6f0"/>
      <stop offset="100%" stop-color="#a8b8cc" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="wingR" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"   stop-color="#ccd6e4" stop-opacity="0.95"/>
      <stop offset="40%"  stop-color="#dde6f0"/>
      <stop offset="100%" stop-color="#a8b8cc" stop-opacity="0.8"/>
