<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>智慧航空雷達系統</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background-color: #000; font-family: 'Share Tech Mono', monospace; user-select: none; overflow: hidden; }
        #map { width: 100vw; height: 100vh; }
        .leaflet-control-attribution, .leaflet-control-zoom { display: none; }
        
        .plane-icon { display: flex; justify-content: center; align-items: center; transition: all 0.3s ease; }
        .plane-fading { opacity: 0.3 !important; }
        .emergency-glow { filter: drop-shadow(0 0 20px #FF4136) !important; animation: emergency-pulse 0.3s infinite; }
        @keyframes emergency-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.1); } }
        .ground-glow { filter: drop-shadow(0 0 3px #666) !important; opacity: 0.5; }
        .climbing { filter: drop-shadow(0 0 8px #00FF00) !important; }
        .descending { filter: drop-shadow(0 0 8px #FFA500) !important; }

        #dashboard { position: absolute; top: 20px; right: 20px; z-index: 1000; background: rgba(10, 15, 20, 0.95); border: 1px solid rgba(1, 255, 112, 0.4); border-radius: 10px; padding: 18px 24px; color: #fff; box-shadow: 0 8px 32px rgba(0,0,0,0.9); backdrop-filter: blur(16px); min-width: 300px; }
        .title-container { display: flex; align-items: center; margin-bottom: 15px; }
        .live-dot { width: 12px; height: 12px; background-color: #01FF70; border-radius: 50%; margin-right: 12px; box-shadow: 0 0 15px #01FF70; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(1.4); } 100% { opacity: 1; transform: scale(1); } }
        #dashboard h2 { margin: 0; font-size: 20px; color: #01FF70; letter-spacing: 2px; text-shadow: 0 0 10px rgba(1, 255, 112, 0.5); }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; color: #aaa; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .stat-row:last-child { border-bottom: none; }
        .stat-value { font-weight: bold; color: #01FF70; font-size: 18px; text-shadow: 0 0 8px rgba(1, 255, 112, 0.4); }
        .realtime-badge { background: linear-gradient(135deg, #FF0080, #7928CA, #FF0080); background-size: 200% 200%; animation: gradient-shift 3s ease infinite; padding: 4px 10px; border-radius: 5px; font-size: 11px; font-weight: bold; letter-spacing: 1px; box-shadow: 0 0 15px rgba(255, 0, 128, 0.5); }
        @keyframes gradient-shift { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

        #stats-panel { position: absolute; top: 20px; left: 20px; z-index: 1000; background: rgba(10, 15, 20, 0.95); border: 1px solid rgba(1, 255, 112, 0.4); border-radius: 10px; padding: 18px 24px; color: #fff; backdrop-filter: blur(16px); min-width: 320px; }
        .stats-title { font-size: 18px; color: #01FF70; margin-bottom: 15px; border-bottom: 2px solid #01FF70; padding-bottom: 10px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-box { background: linear-gradient(135deg, rgba(1, 255, 112, 0.1), rgba(1, 255, 112, 0.05)); padding: 12px; border-radius: 6px; text-align: center; border: 1px solid rgba(1, 255, 112, 0.2); transition: all 0.3s; cursor: pointer; }
        .stat-box:hover { transform: translateY(-3px); box-shadow: 0 5px 20px rgba(1, 255, 112, 0.3); }
        .stat-box-label { font-size: 11px; color: #888; margin-bottom: 6px; text-transform: uppercase; }
        .stat-box-value { font-size: 24px; font-weight: bold; color: #01FF70; text-shadow: 0 0 10px rgba(1, 255, 112, 0.5); }

        .cyber-label { background: rgba(10, 15, 20, 0.95) !important; border: 1px solid rgba(1, 255, 112, 0.6) !important; border-radius: 6px !important; color: #01FF70 !important; font-family: 'Share Tech Mono', monospace; font-size: 11px !important; padding: 5px 10px !important; backdrop-filter: blur(10px); box-shadow: 0 0 15px rgba(1, 255, 112, 0.3) !important; }
        .cyber-label::before, .cyber-label::after { display: none !important; }

        #sidebar { position: absolute; top: 0; right: 0; width: 420px; height: 100vh; z-index: 2000; background: rgba(15, 20, 25, 0.98); border-left: 2px solid #FFDC00; box-shadow: -8px 0 40px rgba(0,0,0,0.95); backdrop-filter: blur(16px); transform: translateX(100%); transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); display: flex; flex-direction: column; color: #fff; }
        #sidebar.active { transform: translateX(0); }
        .sb-header { padding: 20px 24px; background: rgba(0,0,0,0.7); border-bottom: 2px solid #444; display: flex; justify-content: space-between; align-items: center; }
        .sb-title { font-size: 28px; font-weight: bold; color: #FFDC00; margin: 0; text-shadow: 0 0 15px rgba(255, 220, 0, 0.5); }
        .sb-close { cursor: pointer; color: #aaa; font-size: 32px; transition: 0.3s; }
        .sb-close:hover { color: #FF4136; transform: rotate(90deg); }
        .sb-content { padding: 24px; overflow-y: auto; flex-grow: 1; }
        .sb-section-title { font-size: 13px; color: #01FF70; border-bottom: 2px solid #01FF70; padding-bottom: 8px; margin: 20px 0 15px 0; letter-spacing: 1px; text-transform: uppercase; }
        .sb-data-row { display: flex; justify-content: space-between; margin-bottom: 14px; font-size: 15px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sb-data-label { color: #aaa; }
        .sb-data-value { font-weight: bold; color: #fff; text-align: right; }
        .alert-box { color: #FF4136; border: 2px solid #FF4136; padding: 12px; text-align: center; margin-bottom: 20px; border-radius: 8px; animation: emergency-pulse 1s infinite; display: none; background: rgba(255, 65, 54, 0.15); font-weight: bold; font-size: 14px; }

        .connection-status { position: absolute; bottom: 20px; right: 20px; z-index: 1000; background: rgba(10, 15, 20, 0.95); border: 1px solid rgba(1, 255, 112, 0.4); border-radius: 8px; padding: 10px 16px; color: #fff; backdrop-filter: blur(16px); font-size: 12px; display: flex; flex-direction: column; gap: 5px; min-width: 200px; }
        .status-connected { border-color: #00FF00; }
        .status-warning { border-color: #FFDC00; }
        .status-error { border-color: #FF4136; }
        .status-main { font-weight: bold; }
        .status-detail { font-size: 10px; color: #888; }
        .rate-limit-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; margin-top: 5px; }
        .rate-limit-progress { height: 100%; background: linear-gradient(90deg, #00FF00, #FFDC00, #FF4136); transition: width 0.3s; }

        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .loading-spinner { border: 5px solid rgba(1, 255, 112, 0.2); border-top: 5px solid #01FF70; border-radius: 50%; width: 80px; height: 80px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { color: #01FF70; margin-top: 25px; font-size: 18px; letter-spacing: 3px; text-shadow: 0 0 10px rgba(1, 255, 112, 0.5); }

        #notification-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10000; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .notification { background: rgba(10, 15, 20, 0.95); border: 1px solid #01FF70; border-radius: 8px; padding: 15px 20px; color: #fff; backdrop-filter: blur(16px); box-shadow: 0 5px 25px rgba(0,0,0,0.8); animation: slideDown 0.3s ease-out; pointer-events: all; max-width: 400px; }
        .notification.error { border-color: #FF4136; }
        .notification.warning { border-color: #FFDC00; }
        .notification.success { border-color: #00FF00; }
        @keyframes slideDown { 0% { opacity: 0; transform: translateY(-20px); } 100% { opacity: 1; transform: translateY(0); } }

        @media (max-width: 1024px) { #stats-panel { display: none; } #sidebar { width: 100vw; } }
        @media (max-width: 768px) { #dashboard { top: 10px; right: 10px; padding: 12px 16px; min-width: 200px; } }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        ::-webkit-scrollbar-thumb { background: rgba(1, 255, 112, 0.5); border-radius: 4px; }
    </style>
</head>
<body>

<div class="loading-overlay" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">初始化智慧雷達系統...</div>
</div>

<div id="notification-container"></div>

<div id="dashboard">
    <div class="title-container">
        <div class="live-dot" id="status-dot"></div>
        <h2>智慧雷達</h2>
    </div>
    <div style="text-align: center; margin-bottom: 12px;">
        <span class="realtime-badge">🔴 LIVE</span>
    </div>
    <div class="stat-row"><span>系統時間</span><span id="sys-time" class="stat-value">--:--:--</span></div>
    <div class="stat-row"><span>總飛機數</span><span id="plane-count" class="stat-value">---</span></div>
    <div class="stat-row"><span>活躍飛機</span><span id="active-count" class="stat-value">---</span></div>
    <div class="stat-row"><span>緊急狀況</span><span id="emergency-count" class="stat-value">0</span></div>
</div>

<div id="stats-panel">
    <div class="stats-title">📊 即時統計</div>
    <div class="stats-grid">
        <div class="stat-box"><div class="stat-box-label">爬升中</div><div class="stat-box-value" id="climbing-count">0</div></div>
        <div class="stat-box"><div class="stat-box-label">下降中</div><div class="stat-box-value" id="descending-count">0</div></div>
        <div class="stat-box"><div class="stat-box-label">巡航中</div><div class="stat-box-value" id="cruising-count">0</div></div>
        <div class="stat-box"><div class="stat-box-label">地面</div><div class="stat-box-value" id="ground-count">0</div></div>
    </div>
</div>

<div class="connection-status status-connected" id="connection-status">
    <div class="status-main" id="connection-text">⚡ 連線中...</div>
    <div class="status-detail" id="connection-detail">初始化中</div>
    <div class="rate-limit-bar"><div class="rate-limit-progress" id="rate-limit-bar" style="width: 100%;"></div></div>
</div>

<div id="sidebar">
    <div class="sb-header">
        <h2 class="sb-title" id="sb-callsign">------</h2>
        <div class="sb-close" onclick="closeSidebar()">×</div>
    </div>
    <div class="sb-content">
        <div class="alert-box" id="sb-alert">🚨 緊急狀況偵測</div>
        <div class="sb-section-title">✈️ 航班識別</div>
        <div class="sb-data-row"><span class="sb-data-label">ICAO24</span><span class="sb-data-value" id="sb-icao">--</span></div>
        <div class="sb-data-row"><span class="sb-data-label">國家</span><span class="sb-data-value" id="sb-country">--</span></div>
        <div class="sb-section-title">📍 空間資料</div>
        <div class="sb-data-row"><span class="sb-data-label">高度</span><span class="sb-data-value" id="sb-alt">--</span></div>
        <div class="sb-data-row"><span class="sb-data-label">地速</span><span class="sb-data-value" id="sb-spd">--</span></div>
        <div class="sb-data-row"><span class="sb-data-label">航向</span><span class="sb-data-value" id="sb-hdg">--</span></div>
        <div class="sb-data-row"><span class="sb-data-label">垂直速率</span><span class="sb-data-value" id="sb-vrate">--</span></div>
        <div class="sb-section-title">🌍 位置座標</div>
        <div class="sb-data-row"><span class="sb-data-label">緯度</span><span class="sb-data-value" id="sb-lat">--</span></div>
        <div class="sb-data-row"><span class="sb-data-label">經度</span><span class="sb-data-value" id="sb-lng">--</span></div>
    </div>
</div>

<div id="map"></div>

<script>
    const map = L.map('map', { zoomControl: false, preferCanvas: true }).setView([25.17, 121.44], 10);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
    const planeLayer = L.layerGroup().addTo(map);

    const planesDict = {}; 
    const flightHistory = {};
    let selectedIcao24 = null; 
    let emergencyCount = 0;
    let lastFetchTime = Date.now();

    // ==========================================
    // 智慧速率控制系統
    // ==========================================
    const RateLimiter = {
        requestCount: 0,
        maxRequests: 10,
        windowMs: 60000, // 1分鐘
        windowStart: Date.now(),
        failCount: 0,
        currentInterval: 15000, // 初始15秒
        minInterval: 15000,
        maxInterval: 120000, // 最大2分鐘
        
        canRequest() {
            const now = Date.now();
            if (now - this.windowStart > this.windowMs) {
                this.requestCount = 0;
                this.windowStart = now;
            }
            return this.requestCount < this.maxRequests;
        },
        
        recordRequest() {
            this.requestCount++;
            this.updateUI();
        },
        
        recordSuccess() {
            this.failCount = 0;
            // 成功後逐漸降低間隔（但不低於最小值）
            if (this.currentInterval > this.minInterval) {
                this.currentInterval = Math.max(this.minInterval, this.currentInterval - 5000);
            }
        },
        
        recordFailure() {
            this.failCount++;
            // 失敗後指數增加間隔
            this.currentInterval = Math.min(this.maxInterval, this.currentInterval * 1.5);
            showNotification(`⚠️ API 限制 - 調整更新間隔至 ${Math.round(this.currentInterval/1000)}秒`, 'warning');
        },
        
        getInterval() {
            return this.currentInterval;
        },
        
        updateUI() {
            const remaining = this.maxRequests - this.requestCount;
            const percentage = (remaining / this.maxRequests) * 100;
            document.getElementById('rate-limit-bar').style.width = percentage + '%';
            document.getElementById('connection-detail').innerText = 
                `剩餘請求: ${remaining}/${this.maxRequests} | 間隔: ${Math.round(this.currentInterval/1000)}s`;
        }
    };

    const CONFIG = {
        DATA_TIMEOUT: 180000,
        STALE_THRESHOLD: 60000,
        FADE_THRESHOLD: 120000,
        MIN_VELOCITY: 10
    };

    // ==========================================
    // 通知系統
    // ==========================================
    function showNotification(message, type = 'success') {
        const container = document.getElementById('notification-container');
        const notification = document.createElement('div');
        notification.className = `notification ${type}`;
        notification.innerText = message;
        container.appendChild(notification);
        setTimeout(() => {
            notification.style.animation = 'slideDown 0.3s ease-out reverse';
            setTimeout(() => notification.remove(), 300);
        }, 4000);
    }

    // ==========================================
    // 智慧資料獲取
    // ==========================================
    let fetchTimer = null;

    async function fetchPlanes() {
        // 檢查速率限制
        if (!RateLimiter.canRequest()) {
            updateConnectionStatus('⏳ 等待速率限制', 'warning');
            return;
        }

        const bounds = map.getBounds();
        const url = `https://opensky-network.org/api/states/all?lamin=${bounds.getSouth()}&lomin=${bounds.getWest()}&lamax=${bounds.getNorth()}&lomax=${bounds.getEast()}`;
        
        try {
            RateLimiter.recordRequest();
            updateConnectionStatus('🔄 獲取資料中...', 'warning');
            
            const response = await fetch(url, { signal: AbortSignal.timeout(15000) });
            const text = await response.text();
            
            if (text.includes('Too many requests') || response.status === 429) {
                RateLimiter.recordFailure();
                updateConnectionStatus('⚠️ API 限制', 'warning');
                rescheduleNextFetch();
                return;
            }

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const data = JSON.parse(text);
            lastFetchTime = Date.now();
            processData(data);
            RateLimiter.recordSuccess();
            updateConnectionStatus('✓ 已連線', 'connected');
            rescheduleNextFetch();

        } catch (error) {
            console.warn('獲取錯誤:', error.message);
            RateLimiter.recordFailure();
            updateConnectionStatus('❌ 連線錯誤', 'error');
            rescheduleNextFetch();
        }
    }

    function rescheduleNextFetch() {
        if (fetchTimer) clearTimeout(fetchTimer);
        const interval = RateLimiter.getInterval();
        fetchTimer = setTimeout(fetchPlanes, interval);
    }

    // ==========================================
    // 資料處理
    // ==========================================
    function processData(data) {
        if (!data.states) return;
        
        const nowUnix = Math.floor(Date.now() / 1000);
        const seenIcaos = new Set();
        emergencyCount = 0;
        let newPlanes = 0;

        data.states.forEach(plane => {
            const icao24 = plane[0];
            const lastContact = plane[4] || nowUnix;
            const dataAge = (nowUnix - lastContact) * 1000;
            
            seenIcaos.add(icao24);
            
            const pData = {
                icao24: icao24,
                callsign: plane[1] ? plane[1].trim() : 'UNKNOWN',
                country: plane[2] || 'Unknown',
                lng: plane[5],
                lat: plane[6],
                altitude: plane[7] ? Math.round(plane[7]) : 0,
                onGround: plane[8] || false,
                velocity: plane[9] || 0,
                heading: plane[10] || 0,
                vRate: plane[11] || 0,
                squawk: plane[14] || '',
                lastContact: lastContact,
                lastSeen: Date.now(),
                dataAge: dataAge,
                isStale: dataAge > CONFIG.STALE_THRESHOLD,
                shouldFade: dataAge > CONFIG.FADE_THRESHOLD
            };

            pData.isEmergency = ['7700', '7600', '7500'].includes(pData.squawk);
            if (pData.isEmergency) {
                emergencyCount++;
                if (!planesDict[icao24]) {
                    showNotification(`🚨 緊急狀況: ${pData.callsign}`, 'error');
                }
            }

            if (!pData.lat || !pData.lng) return;

            if (!flightHistory[icao24]) flightHistory[icao24] = [];
            flightHistory[icao24].push([pData.lat, pData.lng]);
            if (flightHistory[icao24].length > 150) flightHistory[icao24].shift();

            if (!planesDict[icao24]) {
                newPlanes++;
                const marker = L.marker([pData.lat, pData.lng]).addTo(planeLayer);
                marker.on('click', (e) => {
                    L.DomEvent.stopPropagation(e);
                    selectedIcao24 = icao24;
                    renderPlanes();
                });
                pData.marker = marker;
                planesDict[icao24] = pData;
            } else {
                Object.assign(planesDict[icao24], pData);
            }
        });

        if (newPlanes > 0) {
            showNotification(`✈️ 發現 ${newPlanes} 架新飛機`, 'success');
        }

        const now = Date.now();
        Object.keys(planesDict).forEach(id => {
            const plane = planesDict[id];
            const timeSinceLastSeen = now - plane.lastSeen;
            
            if (timeSinceLastSeen > CONFIG.DATA_TIMEOUT) {
                planeLayer.removeLayer(plane.marker);
                delete planesDict[id];
            } else if (!seenIcaos.has(id)) {
                plane.isStale = true;
                plane.shouldFade = timeSinceLastSeen > CONFIG.FADE_THRESHOLD;
            }
        });

        updateStatistics();
        renderPlanes();
    }

    function updateStatistics() {
        let activeCount = 0, staleCount = 0;
        let climbingCount = 0, descendingCount = 0, cruisingCount = 0, groundCount = 0;

        Object.values(planesDict).forEach(p => {
            if (p.isStale) staleCount++;
            else activeCount++;

            if (p.onGround) groundCount++;
            else if (p.vRate > 2.5) climbingCount++;
            else if (p.vRate < -2.5) descendingCount++;
            else cruisingCount++;
        });

        document.getElementById('plane-count').innerText = Object.keys(planesDict).length.toString().padStart(3, '0');
        document.getElementById('active-count').innerText = activeCount.toString().padStart(3, '0');
        document.getElementById('emergency-count').innerText = emergencyCount;
        document.getElementById('climbing-count').innerText = climbingCount;
        document.getElementById('descending-count').innerText = descendingCount;
        document.getElementById('cruising-count').innerText = cruisingCount;
        document.getElementById('ground-count').innerText = groundCount;
    }

    function getAltitudeColor(altitude, onGround, isEmergency, isStale) {
        if (isEmergency) return '#FF4136'; 
        if (onGround) return '#888888';
        if (isStale) return '#FFA500';
        if (altitude < 1000) return '#FF4136';
        if (altitude < 3000) return '#FF6B35';
        if (altitude < 6000) return '#FFDC00';
        if (altitude < 10000) return '#7FFF00';
        return '#01FF70';
    }

    function createPlaneIcon(heading, altitude, isSelected, onGround, isEmergency, vRate, isStale, shouldFade) {
        const color = getAltitudeColor(altitude, onGround, isEmergency, isStale);
        let extraClass = '';
        
        if (isEmergency) extraClass = 'emergency-glow';
        else if (onGround) extraClass = 'ground-glow';
        else if (vRate > 2.5) extraClass = 'climbing';
        else if (vRate < -2.5) extraClass = 'descending';
        
        if (shouldFade) extraClass += ' plane-fading';
        
        const glow = isSelected ? `drop-shadow(0 0 20px #FFDC00)` : `drop-shadow(0 0 8px ${color})`;
        const planeColor = isSelected ? '#FFDC00' : color;
        const size = isSelected ? 36 : 30;
        
        const svg = `<svg viewBox="0 0 24 24" width="${size}" height="${size}" style="transform: rotate(${heading}deg); filter: ${glow};"><path fill="${planeColor}" d="M21,16V14L13,9V3.5A1.5,1.5 0 0,0 11.5,2A1.5,1.5 0 0,0 10,3.5V9L2,14V16L10,13.5V19L8,20.5V22L11.5,21L15,22V20.5L13,19V13.5L21,16Z" /></svg>`;
        return L.divIcon({ html: svg, className: `plane-icon ${extraClass}`, iconSize: [size, size], iconAnchor: [size/2, size/2] });
    }

    function updateConnectionStatus(text, status) {
        const statusEl = document.getElementById('connection-status');
        statusEl.className = `connection-status status-${status}`;
        document.getElementById('connection-text').innerHTML = text;
        
        const dotColors = { connected: '#01FF70', warning: '#FFDC00', error: '#FF4136' };
        document.getElementById('status-dot').style.backgroundColor = dotColors[status];
    }

    function closeSidebar() {
        selectedIcao24 = null;
        document.getElementById('sidebar').classList.remove('active');
        renderPlanes(); 
    }
    map.on('click', closeSidebar);

    function updateSidebar(plane) {
        document.getElementById('sidebar').classList.add('active');
        document.getElementById('sb-alert').style.display = plane.isEmergency ? 'block' : 'none';
        document.getElementById('sb-callsign').innerText = plane.callsign;
        document.getElementById('sb-icao').innerText = plane.icao24.toUpperCase();
        document.getElementById('sb-country').innerText = plane.country;
        document.getElementById('sb-alt').innerText = plane.onGround ? 'GROUND' : `${plane.altitude.toLocaleString()} m`;
        document.getElementById('sb-spd').innerText = `${Math.round(plane.velocity * 3.6)} km/h`;
        document.getElementById('sb-hdg').innerText = `${Math.round(plane.heading)}°`;
        document.getElementById('sb-vrate').innerText = plane.vRate > 0 ? `↗ ${plane.vRate.toFixed(1)} m/s` : (plane.vRate < 0 ? `↘ ${Math.abs(plane.vRate).toFixed(1)} m/s` : '→ 水平');
        document.getElementById('sb-lat').innerText = plane.lat.toFixed(6) + '°';
        document.getElementById('sb-lng').innerText = plane.lng.toFixed(6) + '°';
    }

    setInterval(() => {
        document.getElementById('sys-time').innerText = new Date().toLocaleTimeString('zh-TW', { hour12: false });
    }, 1000);

    const EARTH_RADIUS = 6371000;
    let lastDrawTime = performance.now();
    
    function animatePlanes() {
        requestAnimationFrame(animatePlanes);
        const now = performance.now();
        const deltaTime = (now - lastDrawTime) / 1000; 
        lastDrawTime = now;

        for (const id in planesDict) {
            const p = planesDict[id];
            
            if (!p.onGround && !p.isStale && p.velocity > CONFIG.MIN_VELOCITY) {
                const dist = p.velocity * deltaTime;
                const brng = p.heading * Math.PI / 180;
                const lat1 = p.lat * Math.PI / 180;
                const lng1 = p.lng * Math.PI / 180;
                
                const lat2 = Math.asin(
                    Math.sin(lat1) * Math.cos(dist / EARTH_RADIUS) + 
                    Math.cos(lat1) * Math.sin(dist / EARTH_RADIUS) * Math.cos(brng)
                );
                const lng2 = lng1 + Math.atan2(
                    Math.sin(brng) * Math.sin(dist / EARTH_RADIUS) * Math.cos(lat1), 
                    Math.cos(dist / EARTH_RADIUS) - Math.sin(lat1) * Math.sin(lat2)
                );
                
                p.lat = lat2 * 180 / Math.PI;
                p.lng = lng2 * 180 / Math.PI;
            }
            
            p.marker.setLatLng([p.lat, p.lng]);
        }
    }

    function renderPlanes() {
        for (const id in planesDict) {
            const p = planesDict[id];
            const isSelected = (id === selectedIcao24);
            
            p.marker.setIcon(createPlaneIcon(
                p.heading, p.altitude, isSelected, p.onGround, 
                p.isEmergency, p.vRate, p.isStale, p.shouldFade
            ));
            
            p.marker.bindTooltip(p.callsign, { 
                permanent: map.getZoom() > 9, 
                direction: 'right', 
                offset: [18, 0], 
                className: 'cyber-label' 
            });
            
            if (isSelected) updateSidebar(p);
        }
    }

    setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
        showNotification('🚀 智慧雷達系統啟動！', 'success');
        updateConnectionStatus('⚡ 初始化中...', 'warning');
        fetchPlanes();
    }, 2000);

    animatePlanes();
</script>
</body>
